// ── Calculators ──────────────────────────────────────────────────────
function calcBase(costoMat, tiempoHrs, v, perf, fijosKey) {
  const elec = perf ? perf.electricidad : v.costoElectricidadHora;
  const fijos = perf ? (perf[fijosKey] || 800) : v.costosFijos;
  const electricidad = tiempoHrs * elec;
  const manoObra = (v.manoObraHora||0) * (v.horasManoObra||0);
  const otrosGastos = v.otrosGastos||0;
  const amortH = v.precioMaquina > 0 ? (v.precioMaquina*(1+(v.pctReparaciones||5)/100)) / ((v.vidaUtilAnios||3)*365*(v.horasUsoDiario||8)) : 0;
  const amortizacion = amortH * tiempoHrs;
  const costoTotal = (costoMat + electricidad + fijos + manoObra + otrosGastos + amortizacion) * v.cantidad;
  const precioSugerido = costoTotal / (1 - v.margenDeseado/100);
  return { costoMat, electricidad, fijos, manoObra, otrosGastos, amortizacion, costoTotal, precioSugerido, ganancia: precioSugerido - costoTotal };
}
function calc3D(v, fil, perf) {
  const cxg = fil ? fil.costo : v.costoPorGramo;
  return calcBase(v.pesoGramos*cxg, v.tiempoHoras, v, perf, "fijos3D");
}
function calcSub(v, sus, tin, perf) {
  const cSus = sus ? sus.costo : v.costoSustrato;
  const cTin = tin ? tin.costo : v.costoTinta;
  return calcBase(cSus+cTin, v.tiempoMinutos/60, v, perf, "fijosSub");
}
function calcBor(v, perf) { return calcBase(v.costoHilo+v.costoEntretela, v.tiempoMinutos/60, v, perf, "fiosBor"); }
function calcVin(v, perf) { return calcBase(v.costoVinilo+v.costoTransfer, v.tiempoMinutos/60, v, perf, "fijosVin"); }
function calcLas(v, perf) { return calcBase(v.costoMaterial, v.tiempoMinutos/60, v, perf, "fijosLas"); }

  async function llamarGemini(texto) {
    const prompt = `Analizá esta lista de precios y extraé productos con precios. Respondé SOLO JSON sin backticks:\n{"proveedor":null,"fecha":null,"insumos":[{"nombre":"nombre","precio":1234,"unidad":"gr o kg o u","tipo":"3D o SUB o General","notas":null}]}\nReglas: precio como número sin símbolos. tipo "3D" para filamentos, "SUB" para sustratos/tintas, "General" para otros.\n\nContenido:\n${texto.substring(0,8000)}`;
    const res = await fetch(GEMINI_URL,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.1} }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message||"Error "+res.status);
    const txt = data.candidates[0].content.parts[0].text.trim().replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
    return JSON.parse(txt);
  }

  async function leerPDF(archivo) {
    setProLoading(true); setProError(null); setProResultado(null);
    try {
      const b64 = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result.split(",")[1]); r.onerror=rej; r.readAsDataURL(archivo); });
      const lib = await new Promise((resolve,reject)=>{ if(window.pdfjsLib){resolve(window.pdfjsLib);return;} const s=document.createElement("script"); s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"; s.onload=()=>{ window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js"; resolve(window.pdfjsLib); }; s.onerror=()=>reject(new Error("No se pudo cargar pdf.js")); document.head.appendChild(s); });
      const pdfArr = new Uint8Array(atob(b64).split("").map(c=>c.charCodeAt(0)));
      const pdf = await lib.getDocument({data:pdfArr}).promise;
      let texto=""; for(let i=1;i<=Math.min(pdf.numPages,10);i++){ const pg=await pdf.getPage(i); const ct=await pg.getTextContent(); texto+=ct.items.map(x=>x.str).join(" ")+"\n"; }
      if (!texto.trim()) throw new Error("No se pudo extraer texto del PDF");
      const resultado = await llamarGemini(texto);
      setProResultado({ok:true,...resultado});
    } catch(e) { setProError(e.message); }
    finally { setProLoading(false); }
  }

  async function leerURL() {
    if (!proUrl.trim()) return;
    setProLoading(true); setProError(null); setProResultado(null);

      if (!proxyRes.ok) throw new Error("No se pudo acceder a la URL");
      const pd = await proxyRes.json();
      const texto = (pd.contents||"").replace(/<script[^>]*>[\s\S]*?<\/script>/gi,"").replace(/<style[^>]*>[\s\S]*?<\/style>/gi,"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
      if (!texto||texto.length<20) throw new Error("La página no tiene contenido legible");
      const resultado = await llamarGemini(texto);
      setProResultado({ok:true,...resultado});
    } catch(e) { setProError(e.message); }
    finally { setProLoading(false); }
  }

                    )
                  ),
                  h("div",{style:{textAlign:"center",padding:"16px 0",background:diff>0?"#f8717112":"#22d07a12",borderRadius:12,marginBottom:20,border:"1px solid "+(diff>0?"#f8717130":"#22d07a30")}},
                    h("div",{style:{fontSize:12,color:MUTED,marginBottom:4}},"Diferencia en el precio"),
                    h("div",{style:{fontSize:32,fontWeight:900,fontFamily:"monospace",color:diff>0?"#f87171":"#22d07a"}},(diff>0?"+":"")+fmt(Math.round(diff))),
                    h("div",{style:{fontSize:13,color:diff>0?"#f87171":"#22d07a",marginTop:4}},(diffPct>0?"+":"")+diffPct+"% vs precio actual")
                  ),
                  // Desglose de cambios
                  h("div",{style:{fontSize:10,fontWeight:700,color:MUTED,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}},"Detalle de cambios"),
                  [
                    ["Materiales", base.mat, sim.mat, "#ff5c1a"],
                    ["Electricidad/fijos", base.elec+base.fijos, sim.elec+sim.fijos, "#38bdf8"],
                    ["Mano de obra", base.mano, sim.mano, "#a78bfa"],
                    ["Margen", base.margen+"%", sim.margen+"%", "#22d07a"],
                  ].filter(([,bv])=>typeof bv==="number"?bv>0:true).map(([l,bv,sv,c])=>
                    h("div",{key:l,style:{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #1a1a2e",fontSize:13}},
                      h("span",{style:{color:MUTED}},l),
                      h("span",null,
                        h("span",{style:{fontFamily:"monospace",color:"#666",marginRight:8}},typeof bv==="number"?fmt(Math.round(bv)):bv),
                        h("span",{style:{color:"#444"}},"→"),
                        h("span",{style:{fontFamily:"monospace",color:c,marginLeft:8}},typeof sv==="number"?fmt(Math.round(sv)):sv)
                      )
                    )
                  )
                );
              })()
            )
          )
        )
      )
    ),

    // ── MODALS ──
    showCodigo && h(Modal,{title:"⭐ Activar Plan Pro",onClose:()=>{setShowCodigo(false);setCodigoError("");setCodigoInput("");}},
      h("div",{style:{background:"#fbbf2412",border:"1px solid #fbbf2430",borderRadius:10,padding:"12px 14px",marginBottom:16,fontSize:13,color:"#d4a82a",lineHeight:1.6}},"Ingresá el código que recibiste al suscribirte al plan Pro."),
      h(Field,{label:"Código de acceso",value:codigoInput,onChange:v=>{setCodigoInput(v.toUpperCase());setCodigoError("");},placeholder:"Ej: JP-2026-001"}),
      codigoError && h("div",{style:{color:"#f87171",fontSize:13,marginBottom:12,background:"#f8717115",border:"1px solid #f8717130",borderRadius:8,padding:"8px 12px"}},"❌ "+codigoError),
      h("button",{onClick:activarPro,style:{...BTN,background:"#fbbf24",color:"#0a0a14",width:"100%",padding:14,borderRadius:10,fontSize:14,marginBottom:10}},"🔑 Activar Pro"),
      h("a",{href:"/precios.html",style:{display:"block",textAlign:"center",fontSize:13,color:MUTED,textDecoration:"none",padding:10}},"¿No tenés código? Suscribite acá →")
    ),

    showInsumo && h(Modal,{title:editIns?"Editar insumo":"Nuevo insumo",onClose:()=>{setShowInsumo(false);setEditIns(null);}},
      h(Field,{label:"Nombre",value:newIns.nombre,onChange:v=>setNewIns(p=>({...p,nombre:v})),placeholder:"Ej: Filamento PLA Negro"}),
      h(DropSelect,{label:"Tipo",value:newIns.tipo,onChange:v=>setNewIns(p=>({...p,tipo:v})),options:[{value:"3D",label:"🖨️ 3D"},{value:"SUB",label:"🎨 Sub"},{value:"BOR",label:"🧵 Bordado"},{value:"VIN",label:"✂️ Vinilo"},{value:"LAS",label:"⚡ Láser"},{value:"General",label:"⚙️ General"}]}),
      h(Field,{label:"Unidad",value:newIns.unidad,onChange:v=>setNewIns(p=>({...p,unidad:v})),placeholder:"gr, u, hoja..."}),
      h(Field,{label:"Costo ($)",value:newIns.costo,onChange:v=>setNewIns(p=>({...p,costo:v})),type:"number",step:1,min:0}),
      h("button",{onClick:saveInsumo,style:{...BTN,background:"#ff5c1a",color:"#fff",width:"100%",padding:14,marginTop:4,borderRadius:10,fontSize:14}},editIns?"Guardar cambios":"Agregar insumo")
    ),

    showPerf && h(Modal,{title:editPerf?"Editar perfil":"Nuevo perfil",onClose:()=>{setShowPerf(false);setEditPerf(null);}},
      h(Field,{label:"Nombre",value:newPerf.nombre,onChange:v=>setNewPerf(p=>({...p,nombre:v})),placeholder:"Ej: Taller principal"}),
      h(Field,{label:"Electricidad ($/hr)",value:newPerf.electricidad,onChange:v=>setNewPerf(p=>({...p,electricidad:v})),type:"number",step:10,min:0}),
      h(Field,{label:"Fijos 3D ($/trabajo)",value:newPerf.fijos3D,onChange:v=>setNewPerf(p=>({...p,fijos3D:v})),type:"number",step:100,min:0}),
      h(Field,{label:"Fijos Sub ($/trabajo)",value:newPerf.fijosSub,onChange:v=>setNewPerf(p=>({...p,fijosSub:v})),type:"number",step:100,min:0}),
      h("button",{onClick:savePerfil,style:{...BTN,background:"#22d07a",color:"#0a0a14",width:"100%",padding:14,marginTop:4,borderRadius:10,fontSize:14}},editPerf?"Guardar cambios":"Crear perfil")
    ),

    showCliente && h(Modal,{title:"📄 Datos del cliente",onClose:()=>setShowCliente(false)},
      h("div",{style:{fontSize:12,color:MUTED,marginBottom:16,lineHeight:1.6}},"Estos datos aparecerán en el PDF. Podés dejar los campos vacíos."),
      h(Field,{label:"Nombre del cliente",value:cliente.nombre,onChange:v=>setCliente(p=>({...p,nombre:v})),placeholder:"Ej: María García"}),
      h(Field,{label:"Descripción del trabajo",value:cliente.descripcion,onChange:v=>setCliente(p=>({...p,descripcion:v})),placeholder:"Ej: Taza cerámica con foto"}),
      h(Field,{label:"Nro de pedido (opcional)",value:cliente.nroPedido,onChange:v=>setCliente(p=>({...p,nroPedido:v})),placeholder:"Ej: #001"}),
      h("button",{onClick:()=>{setShowCliente(false);exportarPDF(tab.label,vals,res,cliente);},style:{...BTN,background:"#ff5c1a",color:"#fff",width:"100%",padding:14,marginTop:4,borderRadius:10,fontSize:14}},"📄 Generar PDF →")
    ),

    showPlantilla && h(Modal,{title:"📋 Guardar plantilla",onClose:()=>setShowPlantilla(false)},
      h("div",{style:{fontSize:12,color:MUTED,marginBottom:16,lineHeight:1.6}},"Guardás la configuración actual de "+tab.label+" como plantilla reutilizable."),
      h(Field,{label:"Nombre de la plantilla",value:plantillaNombre,onChange:setPlantillaNombre,placeholder:"Ej: Taza cerámica estándar"}),
      h("button",{onClick:()=>{if(!plantillaNombre.trim())return;setPlantillas(p=>[{id:Date.now(),nombre:plantillaNombre,tipo:tab.id,vals:{...vals}},...p]);setShowPlantilla(false);setPlantillaNombre("");},style:{...BTN,background:"#ff5c1a",color:"#fff",width:"100%",padding:14,marginTop:4,borderRadius:10,fontSize:14}},"💾 Guardar plantilla")
    )
  );
}

createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
