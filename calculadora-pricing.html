<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calculadora — JotaPrecios</title>
<meta name="description" content="Calculá el precio justo de cada trabajo de impresión 3D y sublimación en segundos." />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d1a; font-family: sans-serif; }
  #root { min-height: 100vh; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
  import { createRoot } from 'https://esm.sh/react-dom@18/client';
  import React, { useState, useRef } from 'https://esm.sh/react@18';

  // ─── PDF Export ─────────────────────────────────────────────────────
  function exportarPDF({ tipo, vals, res, is3D }) {
    const fecha = new Date().toLocaleDateString("es-AR", { day: "2-digit", month: "long", year: "numeric" });
    const nro = Math.floor(Math.random() * 9000) + 1000;
    const f = (v) => `$${Math.round(v).toLocaleString("es-AR")}`;
    const detalles = is3D
      ? `<tr><td>Peso</td><td>${vals.pesoGramos} gr</td></tr><tr><td>Filamento</td><td>${f(vals.pesoGramos * vals.costoPorGramo)}</td></tr><tr><td>Tiempo</td><td>${vals.tiempoHoras} hs</td></tr>`
      : `<tr><td>Sustrato</td><td>${f(vals.costoSustrato)}</td></tr><tr><td>Tinta</td><td>${f(vals.costoTinta)}</td></tr><tr><td>Tiempo</td><td>${vals.tiempoMinutos} min</td></tr>`;
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Presupuesto #${nro}</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;padding:48px;max-width:660px;margin:0 auto;color:#1a1a1a}.hdr{display:flex;justify-content:space-between;margin-bottom:36px;padding-bottom:20px;border-bottom:2px solid #ff5c1a}.logo{font-size:24px;font-weight:800;color:#ff5c1a}.sec{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#ff5c1a;margin:24px 0 10px}table{width:100%;border-collapse:collapse}td{padding:9px 12px;font-size:14px;border-bottom:1px solid #f0f0f0}td:last-child{text-align:right;font-weight:600}.tot td{font-size:15px;font-weight:700;padding:14px 12px;background:#fff8f5;border:none}.tot td:last-child{color:#ff5c1a;font-size:20px}.foot{margin-top:40px;padding-top:14px;border-top:1px solid #eee;display:flex;justify-content:space-between;font-size:11px;color:#aaa}</style>
</head><body>
<div class="hdr"><div><div class="logo">JotaPrecios</div><p style="font-size:11px;color:#888">jotaprecios.com.ar</p></div>
<div style="text-align:right"><h2 style="font-size:17px">Presupuesto #${nro}</h2><p style="font-size:12px;color:#888">${fecha}</p><p style="color:#ff5c1a;font-weight:600;font-size:13px">${tipo}</p></div></div>
<div class="sec">Detalle</div>
<table><tbody>${detalles}<tr><td>Electricidad</td><td>${f(res.electricidad)}</td></tr><tr><td>Costos fijos</td><td>${f(res.fijos)}</td></tr><tr style="color:#aaa"><td>Costo total × ${vals.cantidad}</td><td>${f(res.costoTotal)}</td></tr></tbody></table>
<div class="sec">Precio final</div>
<table><tbody><tr style="color:#aaa;font-size:13px"><td>Precio mínimo</td><td>${f(res.costoTotal)}</td></tr><tr><td>Ganancia (${vals.margenDeseado}%)</td><td style="color:#22c55e">${f(res.ganancia)}</td></tr><tr class="tot"><td>✅ Precio sugerido</td><td>${f(res.precioSugerido)}</td></tr></tbody></table>
<div class="foot"><p>JotaPrecios — jotaprecios.com.ar</p><p>Presupuesto orientativo</p></div>
<script>window.onload=()=>window.print();<\/script></body></html>`;
    const w = window.open("", "_blank");
    w.document.write(html);
    w.document.close();
  }

  const DEFAULT_INSUMOS = [
    { id: 1, nombre: "Filamento PLA 1kg", tipo: "3D", unidad: "gr", costo: 35, activo: true },
    { id: 2, nombre: "Filamento ABS 1kg", tipo: "3D", unidad: "gr", costo: 42, activo: true },
    { id: 3, nombre: "Filamento PETG 1kg", tipo: "3D", unidad: "gr", costo: 48, activo: true },
    { id: 4, nombre: "Filamento TPU 1kg", tipo: "3D", unidad: "gr", costo: 68, activo: true },
    { id: 5, nombre: "Taza cerámica 11oz", tipo: "SUB", unidad: "u", costo: 1200, activo: true },
    { id: 6, nombre: "Remera algodón", tipo: "SUB", unidad: "u", costo: 2800, activo: true },
    { id: 7, nombre: "Tinta sublimación", tipo: "SUB", unidad: "impresión", costo: 380, activo: true },
    { id: 8, nombre: "Papel sublimación A4", tipo: "SUB", unidad: "hoja", costo: 45, activo: true },
  ];
  const DEFAULT_PERFILES = [
    { id: 1, nombre: "Taller pequeño", electricidad: 120, costosFijos3D: 800, costosFijosSub: 500 },
    { id: 2, nombre: "Taller mediano", electricidad: 200, costosFijos3D: 1500, costosFijosSub: 900 },
  ];

  const fmt = (v) => `$${Math.round(v).toLocaleString("es-AR")}`;
  const TIPO_COLOR = { "3D": "#ff6b35", SUB: "#a78bfa", General: "#4ade80" };
  const TIPO_LABEL = { "3D": "🖨️ 3D", SUB: "🎨 Sub", General: "⚙️ Gral" };

  function calcular3D(v, fil, perf) {
    const cxg = fil ? fil.costo : v.costoPorGramo;
    const elec = perf ? perf.electricidad : v.costoElectricidadHora;
    const fijos = perf ? perf.costosFijos3D : v.costosFijos;
    const material = v.pesoGramos * cxg;
    const electricidad = v.tiempoHoras * elec;
    const costoTotal = (material + electricidad + fijos) * v.cantidad;
    const precioSugerido = costoTotal / (1 - v.margenDeseado / 100);
    return { material, electricidad, fijos, costoTotal, precioSugerido, ganancia: precioSugerido - costoTotal };
  }
  function calcularSub(v, sus, tin, perf) {
    const cSus = sus ? sus.costo : v.costoSustrato;
    const cTin = tin ? tin.costo : v.costoTinta;
    const elec = perf ? perf.electricidad : v.costoElectricidadHora;
    const fijos = perf ? perf.costosFijosSub : v.costosFijos;
    const electricidad = (v.tiempoMinutos / 60) * elec;
    const costoTotal = (cSus + cTin + electricidad + fijos) * v.cantidad;
    const precioSugerido = costoTotal / (1 - v.margenDeseado / 100);
    return { cSus, cTin, electricidad, fijos, costoTotal, precioSugerido, ganancia: precioSugerido - costoTotal };
  }

  const CARD = { background: "#111128", border: "1px solid #1e1e3a", borderRadius: 12, padding: 16, marginBottom: 10 };
  const BTN = { border: "none", borderRadius: 8, fontFamily: "inherit", fontWeight: 700, cursor: "pointer" };

  function Tag({ tipo }) {
    return React.createElement("span", { style: { background: TIPO_COLOR[tipo] + "22", color: TIPO_COLOR[tipo], fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 100 } }, TIPO_LABEL[tipo]);
  }

  function Modal({ title, onClose, children }) {
    return React.createElement("div", { style: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 } },
      React.createElement("div", { style: { background: "#111128", border: "1px solid #2a2a4a", borderRadius: 16, padding: 28, width: "100%", maxWidth: 400 } },
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 } },
          React.createElement("span", { style: { fontWeight: 700, fontSize: 16 } }, title),
          React.createElement("button", { onClick: onClose, style: { ...BTN, background: "none", color: "#666", fontSize: 22, padding: "0 4px" } }, "×")
        ),
        children
      )
    );
  }

  function Field({ label, value, onChange, type = "text", step, min, placeholder }) {
    const inputStyle = { width: "100%", background: "#1a1a2e", border: "1px solid #2a2a4a", borderRadius: 8, padding: "10px 14px", color: "#fff", fontSize: 14, fontFamily: "inherit", outline: "none", boxSizing: "border-box" };
    return React.createElement("div", { style: { marginBottom: 13 } },
      React.createElement("label", { style: { display: "block", fontSize: 10, fontWeight: 700, color: "#555", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 5 } }, label),
      React.createElement("input", { type, value, step, min, placeholder, onChange: e => onChange(type === "number" ? (parseFloat(e.target.value) || 0) : e.target.value), style: inputStyle, onFocus: e => e.target.style.borderColor = "#ff6b35", onBlur: e => e.target.style.borderColor = "#2a2a4a" })
    );
  }

  function DropSelect({ label, value, onChange, options }) {
    return React.createElement("div", { style: { marginBottom: 13 } },
      React.createElement("label", { style: { display: "block", fontSize: 10, fontWeight: 700, color: "#555", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 5 } }, label),
      React.createElement("select", { value, onChange: e => onChange(e.target.value), style: { width: "100%", background: "#1a1a2e", border: "1px solid #2a2a4a", borderRadius: 8, padding: "10px 14px", color: "#fff", fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box", cursor: "pointer" } },
        options.map(o => React.createElement("option", { key: o.value, value: o.value }, o.label))
      )
    );
  }

  function NumInput({ label, val, onChange, step = 1, unit = "", disabled = false }) {
    return React.createElement("div", { style: { marginBottom: 11, opacity: disabled ? 0.4 : 1 } },
      React.createElement("label", { style: { display: "block", fontSize: 10, fontWeight: 700, color: "#555", letterSpacing: "0.07em", textTransform: "uppercase", marginBottom: 4 } },
        label, " ", React.createElement("span", { style: { color: "#ff6b35" } }, unit)
      ),
      React.createElement("input", { type: "number", step, min: 0, value: val, disabled, onChange: e => onChange(parseFloat(e.target.value) || 0), style: { width: "100%", background: "#1a1a2e", border: "1px solid #2a2a4a", borderRadius: 8, padding: "9px 12px", color: "#fff", fontSize: 14, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }, onFocus: e => { if (!disabled) e.target.style.borderColor = "#ff6b35"; }, onBlur: e => e.target.style.borderColor = "#2a2a4a" })
    );
  }

  function ResultRow({ label, value, hi, big }) {
    return React.createElement("div", { style: { display: "flex", justifyContent: "space-between", padding: big ? "14px 0" : "8px 0", borderBottom: "1px solid #1a1a2e" } },
      React.createElement("span", { style: { fontSize: big ? 15 : 13, color: hi ? "#fff" : "#666", fontWeight: hi ? 700 : 400 } }, label),
      React.createElement("span", { style: { fontSize: big ? 22 : 13, fontFamily: "monospace", color: hi ? "#ff6b35" : "#ccc", fontWeight: big ? 800 : 500 } }, value)
    );
  }

  function QuickSelect({ label, color, value, onChange, options, onSelect }) {
    return React.createElement("div", { style: { marginBottom: 8 } },
      React.createElement("label", { style: { display: "block", fontSize: 10, fontWeight: 700, color, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 5 } }, label),
      React.createElement("select", { value, onChange: e => { onChange(e.target.value); onSelect(e.target.value); }, style: { width: "100%", background: "#0a0a18", border: "1px solid #1e1e3a", borderRadius: 8, padding: "9px 12px", color: value ? "#fff" : "#555", fontSize: 12, fontFamily: "inherit", outline: "none", cursor: "pointer" } },
        React.createElement("option", { value: "" }, "— Manual —"),
        options.map(i => React.createElement("option", { key: i.id, value: String(i.id) }, `${i.nombre} · ${fmt(i.costo)}/${i.unidad}`))
      )
    );
  }

  function App() {
    const [screen, setScreen] = useState(0);
    const [activeTab, setActiveTab] = useState(0);
    const [tallerTab, setTallerTab] = useState(0);
    const [filterTipo, setFilterTipo] = useState("Todos");
    const [proLoading, setProLoading] = useState(false);
    const [proError, setProError] = useState(null);
    const [proResultado, setProResultado] = useState(null);
    const [proUrl, setProUrl] = useState("");
    const [proModo, setProModo] = useState("pdf"); // "pdf" o "url"
    const fileInputRef = useRef(null);
    const [insumos, setInsumos] = useState(DEFAULT_INSUMOS);
    const [perfiles, setPerfiles] = useState(DEFAULT_PERFILES);
    const [selPerf, setSelPerf] = useState("");
    const [selFil, setSelFil] = useState("");
    const [selSus, setSelSus] = useState("");
    const [selTin, setSelTin] = useState("");
    const [v3D, setV3D] = useState({ pesoGramos: 50, costoPorGramo: 35, tiempoHoras: 3, costoElectricidadHora: 120, costosFijos: 800, margenDeseado: 40, cantidad: 1 });
    const [vSub, setVSub] = useState({ costoSustrato: 1500, costoTinta: 380, tiempoMinutos: 20, costoElectricidadHora: 120, costosFijos: 500, margenDeseado: 50, cantidad: 1 });
    const [showInsumo, setShowInsumo] = useState(false);
    const [showPerf, setShowPerf] = useState(false);
    const [editIns, setEditIns] = useState(null);
    const [editPerf, setEditPerf] = useState(null);
    const [newIns, setNewIns] = useState({ nombre: "", tipo: "3D", unidad: "gr", costo: 0 });
    const [newPerf, setNewPerf] = useState({ nombre: "", electricidad: 120, costosFijos3D: 800, costosFijosSub: 500 });
    const [historial, setHistorial] = useState([]);
    const [savedFlash, setSavedFlash] = useState(false);

    const is3D = activeTab === 0;
    const vals = is3D ? v3D : vSub;
    const set3D = (k) => (v) => setV3D(p => ({ ...p, [k]: v }));
    const setSub = (k) => (v) => setVSub(p => ({ ...p, [k]: v }));
    const filamento = insumos.find(i => String(i.id) === selFil);
    const sustrato = insumos.find(i => String(i.id) === selSus);
    const tinta = insumos.find(i => String(i.id) === selTin);
    const perfil = perfiles.find(p => String(p.id) === selPerf);
    const res = is3D ? calcular3D(v3D, filamento, perfil) : calcularSub(vSub, sustrato, tinta, perfil);
    const ins3D = insumos.filter(i => (i.tipo === "3D" || i.tipo === "General") && i.activo);
    const insSub = insumos.filter(i => (i.tipo === "SUB" || i.tipo === "General") && i.activo);
    const insFiltered = filterTipo === "Todos" ? insumos : insumos.filter(i => i.tipo === filterTipo);

    // Función Pro — leer PDF
    async function leerPDF(archivo) {
      setProLoading(true); setProError(null); setProResultado(null);
      try {
        const base64 = await new Promise((res, rej) => {
          const reader = new FileReader();
          reader.onload = e => res(e.target.result.split(",")[1]);
          reader.onerror = rej;
          reader.readAsDataURL(archivo);
        });

        // Primero extraemos el texto del PDF usando pdf.js
        const pdfjsLib = await import('https://esm.sh/pdfjs-dist@3.11.174');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://esm.sh/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
        const pdfData = atob(base64);
        const pdfArray = new Uint8Array(pdfData.length);
        for (let i = 0; i < pdfData.length; i++) pdfArray[i] = pdfData.charCodeAt(i);
        const pdf = await pdfjsLib.getDocument({ data: pdfArray }).promise;
        let texto = "";
        for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          texto += content.items.map(item => item.str).join(" ") + "\n";
        }

        const res = await fetch("/.netlify/functions/extraer-precios", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tipo: "pdf", contenido: texto }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "Error al procesar el PDF");
        setProResultado(data);
      } catch (e) {
        setProError(e.message);
      } finally {
        setProLoading(false);
      }
    }

    // Función Pro — leer URL
    async function leerURL() {
      if (!proUrl.trim()) return;
      setProLoading(true); setProError(null); setProResultado(null);
      try {
        const res = await fetch("/.netlify/functions/extraer-precios", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tipo: "url", url: proUrl.trim() }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "Error al procesar la URL");
        setProResultado(data);
      } catch (e) {
        setProError(e.message);
      } finally {
        setProLoading(false);
      }
    }

    // Importar insumos del resultado Pro a Mi Taller
    function importarInsumos(insumosNuevos) {
      const nuevos = insumosNuevos.map(ins => ({
        id: Date.now() + Math.random(),
        nombre: ins.nombre,
        tipo: ins.tipo || "General",
        unidad: ins.unidad || "u",
        costo: ins.precio,
        activo: true,
        notas: ins.notas,
      }));
      setInsumos(p => [...nuevos, ...p]);
      setScreen(1);
      setTallerTab(0);
    }

    const tabStyle = (active) => ({ flex: 1, padding: "10px", borderRadius: 10, border: "1px solid", borderColor: active ? "#ff6b35" : "#1e1e3a", background: active ? "#ff6b3512" : "transparent", color: active ? "#ff6b35" : "#444", fontFamily: "inherit", fontWeight: 700, fontSize: 11, cursor: "pointer" });

    function saveInsumo() {
      if (!newIns.nombre.trim()) return;
      if (editIns) setInsumos(p => p.map(i => i.id === editIns.id ? { ...i, ...newIns } : i));
      else setInsumos(p => [...p, { id: Date.now(), ...newIns, activo: true }]);
      setShowInsumo(false); setEditIns(null);
    }
    function savePerfil() {
      if (!newPerf.nombre.trim()) return;
      if (editPerf) setPerfiles(p => p.map(x => x.id === editPerf.id ? { ...x, ...newPerf } : x));
      else setPerfiles(p => [...p, { id: Date.now(), ...newPerf }]);
      setShowPerf(false); setEditPerf(null);
    }
    function saveToHistorial() {
      const entry = { id: Date.now(), fecha: new Date().toLocaleDateString("es-AR", { day: "2-digit", month: "short", year: "numeric" }), hora: new Date().toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" }), tipo: is3D ? "Impresión 3D" : "Sublimación", vals: { ...vals }, costoTotal: res.costoTotal, precioSugerido: res.precioSugerido, ganancia: res.ganancia, margen: vals.margenDeseado };
      setHistorial(p => [entry, ...p].slice(0, 50));
      setSavedFlash(true);
      setTimeout(() => setSavedFlash(false), 1800);
    }

    const h = React.createElement;

    return h("div", { style: { minHeight: "100vh", background: "#0d0d1a", fontFamily: "'Sora','Segoe UI',sans-serif", color: "#fff", paddingBottom: 48 } },
      h("style", null, `@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap');*{box-sizing:border-box}`),

      // Header
      h("div", { style: { background: "linear-gradient(135deg,#0d0d1a,#1a1a2e)", borderBottom: "1px solid #1e1e3a", padding: "20px 16px 0" } },
        h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", maxWidth: 480, margin: "0 auto 16px" } },
          h("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
            h("div", { style: { width: 34, height: 34, borderRadius: 9, background: "linear-gradient(135deg,#ff6b35,#f7c59f)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 } }, "💰"),
            h("div", null,
              h("div", { style: { fontSize: 17, fontWeight: 800 } }, "JotaPrecios"),
              h("div", { style: { fontSize: 9, color: "#333", letterSpacing: "0.06em" } }, "CALCULADORA DE PRECIOS")
            )
          ),
          h("a", { href: "/", style: { fontSize: 12, color: "#444", textDecoration: "none" } }, "← Inicio"),
          perfil && h("div", { style: { background: "#4ade8018", border: "1px solid #4ade8033", color: "#4ade80", fontSize: 10, fontWeight: 700, padding: "4px 10px", borderRadius: 100 } }, `⚙️ ${perfil.nombre}`)
        ),
        h("div", { style: { display: "flex", maxWidth: 480, margin: "0 auto" } },
          ["🧮 Calcular", "🏭 Mi Taller", "📋 Historial", "⭐ Pro"].map((s, i) =>
            h("button", { key: s, onClick: () => setScreen(i), style: { flex: 1, padding: "10px 0", border: "none", background: "none", color: screen === i ? (i === 3 ? "#fbbf24" : "#ff6b35") : "#444", fontFamily: "inherit", fontWeight: 700, fontSize: 11, cursor: "pointer", borderBottom: screen === i ? `2px solid ${i === 3 ? "#fbbf24" : "#ff6b35"}` : "2px solid transparent" } }, s)
          )
        )
      ),

      h("div", { style: { padding: "14px 16px 0", maxWidth: 480, margin: "0 auto" } },

        // CALCULADORA
        screen === 0 && h(React.Fragment, null,
          h("div", { style: { display: "flex", gap: 8, marginBottom: 14 } },
            h("button", { style: tabStyle(activeTab === 0), onClick: () => setActiveTab(0) }, "🖨️ Impresión 3D"),
            h("button", { style: tabStyle(activeTab === 1), onClick: () => setActiveTab(1) }, "🎨 Sublimación")
          ),
          perfiles.length > 0 && h("div", { style: { ...CARD, marginBottom: 10 } },
            h("div", { style: { fontSize: 10, fontWeight: 700, color: "#4ade80", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8 } }, "⚙️ Perfil de taller"),
            h("select", { value: selPerf, onChange: e => setSelPerf(e.target.value), style: { width: "100%", background: "#0a0a18", border: "1px solid #1e1e3a", borderRadius: 8, padding: "9px 12px", color: selPerf ? "#fff" : "#555", fontSize: 12, fontFamily: "inherit", outline: "none", cursor: "pointer" } },
              h("option", { value: "" }, "— Sin perfil (manual) —"),
              perfiles.map(p => h("option", { key: p.id, value: String(p.id) }, `${p.nombre} · Elect. ${fmt(p.electricidad)}/hr`))
            )

                  h("div", { style: { fontWeight: 700, fontSize: 13, marginBottom: 2 } }, ins.nombre),
                  h("div", { style: { display: "flex", gap: 6 } },
                    h("span", { style: { fontSize: 10, background: (ins.tipo === "3D" ? "#ff6b35" : ins.tipo === "SUB" ? "#a78bfa" : "#4ade80") + "22", color: ins.tipo === "3D" ? "#ff6b35" : ins.tipo === "SUB" ? "#a78bfa" : "#4ade80", padding: "1px 7px", borderRadius: 100, fontWeight: 700 } }, ins.tipo),
                    ins.notas && h("span", { style: { fontSize: 10, color: "#444" } }, ins.notas)
                  )
                ),
                h("div", { style: { textAlign: "right" } },
                  h("div", { style: { fontSize: 16, fontWeight: 800, fontFamily: "monospace", color: "#fbbf24" } }, "$" + Math.round(ins.precio).toLocaleString("es-AR")),
                  h("div", { style: { fontSize: 10, color: "#444" } }, "/" + ins.unidad)
                )
              )
            ),

            // Botón importar
            h("button", {
              onClick: () => importarInsumos(proResultado.insumos || []),
              style: { width: "100%", marginTop: 8, background: "linear-gradient(135deg,#fbbf24,#f59e0b)", border: "none", borderRadius: 10, padding: 14, color: "#0d0d1a", fontFamily: "inherit", fontWeight: 800, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }
            }, "⬇️ Importar todos a Mi Taller")
          ),

          // Tip
          !proLoading && !proResultado && h("div", { style: { background: "#0a0a18", border: "1px solid #1e1e3a", borderRadius: 12, padding: 16, marginTop: 14 } },
            h("div", { style: { fontSize: 12, color: "#333", lineHeight: 1.7 } },
              h("div", { style: { marginBottom: 6, color: "#555", fontWeight: 700 } }, "💡 ¿Cómo usarlo?"),
              "1. Pedile a tu proveedor su lista de precios en PDF\n",
              h("br"),
              "2. Subila acá o pegá la URL de su web\n",
              h("br"),
              "3. La IA detecta los productos y precios automáticamente\n",
              h("br"),
              "4. Revisás y los importás a Mi Taller con un clic"
            )
          )
        ),
      
      showInsumo && h(Modal, { title: editIns ? "Editar insumo" : "Nuevo insumo", onClose: () => { setShowInsumo(false); setEditIns(null); } },
        h(Field, { label: "Nombre", value: newIns.nombre, onChange: v => setNewIns(p => ({ ...p, nombre: v })), placeholder: "Ej: Filamento PLA Negro" }),
        h(DropSelect, { label: "Tipo", value: newIns.tipo, onChange: v => setNewIns(p => ({ ...p, tipo: v })), options: [{ value: "3D", label: "🖨️ Impresión 3D" }, { value: "SUB", label: "🎨 Sublimación" }, { value: "General", label: "⚙️ General" }] }),
        h(Field, { label: "Unidad", value: newIns.unidad, onChange: v => setNewIns(p => ({ ...p, unidad: v })), placeholder: "gr, u, hoja..." }),
        h(Field, { label: "Costo ($)", value: newIns.costo, onChange: v => setNewIns(p => ({ ...p, costo: v })), type: "number", step: 1, min: 0 }),
        h("button", { onClick: saveInsumo, style: { ...BTN, background: "#ff6b35", color: "#fff", width: "100%", padding: 14, marginTop: 4, borderRadius: 10, fontSize: 14 } }, editIns ? "Guardar cambios" : "Agregar insumo")
      ),
      showPerf && h(Modal, { title: editPerf ? "Editar perfil" : "Nuevo perfil", onClose: () => { setShowPerf(false); setEditPerf(null); } },
        h(Field, { label: "Nombre", value: newPerf.nombre, onChange: v => setNewPerf(p => ({ ...p, nombre: v })), placeholder: "Ej: Taller principal" }),
        h(Field, { label: "Electricidad ($/hora)", value: newPerf.electricidad, onChange: v => setNewPerf(p => ({ ...p, electricidad: v })), type: "number", step: 10, min: 0 }),
        h(Field, { label: "Costos fijos 3D ($/trabajo)", value: newPerf.costosFijos3D, onChange: v => setNewPerf(p => ({ ...p, costosFijos3D: v })), type: "number", step: 100, min: 0 }),
        h(Field, { label: "Costos fijos Sub ($/trabajo)", value: newPerf.costosFijosSub, onChange: v => setNewPerf(p => ({ ...p, costosFijosSub: v })), type: "number", step: 100, min: 0 }),
        h("button", { onClick: savePerfil, style: { ...BTN, background: "#4ade80", color: "#0d0d1a", width: "100%", padding: 14, marginTop: 4, borderRadius: 10, fontSize: 14 } }, editPerf ? "Guardar cambios" : "Crear perfil")
      )
    );
  }

  createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
