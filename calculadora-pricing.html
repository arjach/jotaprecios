  _token: null,

  auth: {
    async signInWithPassword({email, password}) {
      const r = await fetch(SUPA_URL+"/auth/v1/token?grant_type=password", {
        method:"POST", headers:{"Content-Type":"application/json","apikey":SUPA_KEY},
        body: JSON.stringify({email, password})

    async signUp({email, password}) {
      const r = await fetch(SUPA_URL+"/auth/v1/signup", {
        method:"POST", headers:{"Content-Type":"application/json","apikey":SUPA_KEY},
        body: JSON.stringify({email, password})
      });
      const d = await r.json();
      if (!r.ok) return {data:null, error:{message:d.error_description||d.msg||"Error"}};
      if (d.access_token) { sb._token = d.access_token; sb._uid = d.user.id; localStorage.setItem("jp_token", d.access_token); localStorage.setItem("jp_refresh", d.refresh_token); }
      return {data:{user:d.user||d}, error:null};
    },
    async signOut() {
      if (sb._token) await fetch(SUPA_URL+"/auth/v1/logout", { method:"POST", headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+sb._token} }).catch(()=>{});
      sb._token = null; sb._uid = null;
      localStorage.removeItem("jp_token"); localStorage.removeItem("jp_refresh");
    },
    async getSession() {
      const token = localStorage.getItem("jp_token");
      const refresh = localStorage.getItem("jp_refresh");
      if (!token) return {data:{session:null}};
      // Try to refresh
      try {
        const r = await fetch(SUPA_URL+"/auth/v1/token?grant_type=refresh_token", {
          method:"POST", headers:{"Content-Type":"application/json","apikey":SUPA_KEY},
          body: JSON.stringify({refresh_token: refresh})
        });
        const d = await r.json();
        if (r.ok && d.access_token) {
          sb._token = d.access_token; sb._uid = d.user.id;
          localStorage.setItem("jp_token", d.access_token);
          localStorage.setItem("jp_refresh", d.refresh_token);
          return {data:{session:{user:d.user}}};
        }
      } catch(e) {}
      sb._token = null; sb._uid = null;
      localStorage.removeItem("jp_token"); localStorage.removeItem("jp_refresh");
      return {data:{session:null}};
    },
    async resetPasswordForEmail(email) {
      await fetch(SUPA_URL+"/auth/v1/recover", {
        method:"POST", headers:{"Content-Type":"application/json","apikey":SUPA_KEY},
        body: JSON.stringify({email})
      });
      return {error:null};
    },
    onAuthStateChange(cb) { return {data:{subscription:{unsubscribe:()=>{}}}}; }
  },

  from(table) {
    const base = SUPA_URL+"/rest/v1/"+table;
    const headers = {"apikey":SUPA_KEY,"Authorization":"Bearer "+(sb._token||SUPA_KEY),"Content-Type":"application/json","Prefer":"return=representation"};
    let _filters = [], _order = null, _single = false, _limit = null;

    const q = {
      select(cols="*") { return q; },
      eq(col, val) { _filters.push(`${col}=eq.${val}`); return q; },
      order(col, opts={}) { _order = col+"."+(opts.ascending===false?"desc":"asc"); return q; },
      limit(n) { _limit = n; return q; },
      maybeSingle() { _single = true; _limit = 1; return q; },
      single() { _single = true; _limit = 1; return q; },
      async then(resolve) {
        let url = base+"?";
        if (_filters.length) url += _filters.join("&")+"&";
        if (_order) url += "order="+_order+"&";
        if (_limit) url += "limit="+_limit;
        const r = await fetch(url, {headers});
        const d = await r.json();
        if (_single) resolve({data: Array.isArray(d)?d[0]||null:d, error:r.ok?null:d});
        else resolve({data: r.ok?d:null, error:r.ok?null:d});
      },
      async insert(rows) {
        const body = Array.isArray(rows)?rows:[rows];
        const r = await fetch(base, {method:"POST", headers, body:JSON.stringify(body)});
        const d = await r.json();
        return {data:r.ok?d:null, error:r.ok?null:d};
      },
      async update(vals) {
        let url = base+"?";
        if (_filters.length) url += _filters.join("&");
        const r = await fetch(url, {method:"PATCH", headers, body:JSON.stringify(vals)});
        const d = await r.json();
        return {data:r.ok?d:null, error:r.ok?null:d};
      },
      async delete() {
        let url = base+"?";
        if (_filters.length) url += _filters.join("&");
        const r = await fetch(url, {method:"DELETE", headers});
        return {data:null, error:r.ok?null:await r.json()};
      }
    };
    return q;
  }
};

// ── Calculators ──────────────────────────────────────────────────────
function calcBase(costoMat, tiempoHrs, v, perf, fijosKey) {
  const elec = perf ? perf.electricidad : v.costoElectricidadHora;
  const fijos = perf ? (perf[fijosKey] || 800) : v.costosFijos;
  const electricidad = tiempoHrs * elec;
  const manoObra = (v.manoObraHora||0) * (v.horasManoObra||0);
  const otrosGastos = v.otrosGastos||0;
  const amortH = v.precioMaquina > 0 ? (v.precioMaquina*(1+(v.pctReparaciones||5)/100)) / ((v.vidaUtilAnios||3)*365*(v.horasUsoDiario||8)) : 0;
  const amortizacion = amortH * tiempoHrs;
  const costoTotal = (costoMat + electricidad + fijos + manoObra + otrosGastos + amortizacion) * v.cantidad;
  const precioSugerido = costoTotal / (1 - v.margenDeseado/100);
  return { costoMat, electricidad, fijos, manoObra, otrosGastos, amortizacion, costoTotal, precioSugerido, ganancia: precioSugerido - costoTotal };
}
function calc3D(v, fil, perf) {
  const cxg = fil ? fil.costo : v.costoPorGramo;
  return calcBase(v.pesoGramos*cxg, v.tiempoHoras, v, perf, "fijos3D");
}
function calcSub(v, sus, tin, perf) {
  const cSus = sus ? sus.costo : v.costoSustrato;
  const cTin = tin ? tin.costo : v.costoTinta;
  return calcBase(cSus+cTin, v.tiempoMinutos/60, v, perf, "fijosSub");
}
function calcBor(v, perf) { return calcBase(v.costoHilo+v.costoEntretela, v.tiempoMinutos/60, v, perf, "fiosBor"); }
function calcVin(v, perf) { return calcBase(v.costoVinilo+v.costoTransfer, v.tiempoMinutos/60, v, perf, "fijosVin"); }
function calcLas(v, perf) { return calcBase(v.costoMaterial, v.tiempoMinutos/60, v, perf, "fijosLas"); }

async function syncFromDB(userId, setters) {
  const [insR,perfR,histR,plantR,gastR,confR,compR] = await Promise.all([
    sb.from("insumos").select("*").eq("user_id",userId).order("created_at"),
    sb.from("perfiles_taller").select("*").eq("user_id",userId),
    sb.from("historial").select("*").eq("user_id",userId).order("created_at",{ascending:false}),
    sb.from("plantillas").select("*").eq("user_id",userId),
    sb.from("gastos_fijos").select("*").eq("user_id",userId).order("orden"),
    sb.from("configuracion").select("*").eq("user_id",userId).maybeSingle(),
    sb.from("comparador").select("*").eq("user_id",userId),

function NumInput({ label, val, onChange, step=1, unit="", disabled=false, tooltip=null }) {
  const [tip, setTip] = useState(false);
  const [localVal, setLocalVal] = useState(String(val));

  // Sync from outside only when not focused
  const [focused, setFocused] = useState(false);
  if (!focused && String(val) !== localVal && localVal !== "") {
    setLocalVal(String(val));
  }

  return h("div", { style:{ marginBottom:12, opacity:disabled?0.4:1 } },
    h("div", { style:{ display:"flex",alignItems:"center",gap:6,marginBottom:4 } },
      h("label", { style:{ fontSize:10,fontWeight:700,color:MUTED,letterSpacing:"0.07em",textTransform:"uppercase" } },
        label, " ", h("span", { style:{ color:"#ff5c1a" } }, unit)
      ),
      tooltip && h("button", { onClick:()=>setTip(p=>!p),
        style:{ background:"none",border:"1px solid #2a2a4a",borderRadius:"50%",width:15,height:15,color:MUTED,fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,padding:0 }
      }, "?")
    ),
    tooltip && tip && h("div", { style:{ background:"#0a0a14",border:"1px solid #2a2a4a",borderRadius:8,padding:"10px 12px",marginBottom:8,fontSize:12,color:"#9d9db8",lineHeight:1.6 } }, tooltip),
    h("input", {
      type:"text",
      inputMode:"decimal",
      step, value:localVal, disabled,
      onChange: e => {
        const raw = e.target.value;
        setLocalVal(raw);
        const num = parseFloat(raw.replace(",","."));
        if (!isNaN(num)) onChange(num);
      },
      onFocus: e => { setFocused(true); if(!disabled) e.target.style.borderColor="#ff5c1a"; },
      onBlur: e => {
        setFocused(false);
        e.target.style.borderColor="#2a2a4a";
        // Al salir, si está vacío o inválido, restaurar 0
        const num = parseFloat(localVal.replace(",","."));
        if (isNaN(num) || localVal.trim()==="") { setLocalVal("0"); onChange(0); }
        else { setLocalVal(String(num)); }
      },
      style:{ width:"100%",background:"#0a0a14",border:"1px solid #2a2a4a",borderRadius:8,padding:"10px 12px",color:"#fff",fontSize:15,fontFamily:"'JetBrains Mono',monospace",boxSizing:"border-box" }
    })
  );
}

// Input para gastos fijos — guarda solo al salir (onBlur) y permite borrar libremente
function GastoInput({ label, value, onCommit, min=0, max=null }) {
  const [local, setLocal] = useState(String(value));
  const [focused, setFocused] = useState(false);
  if (!focused && parseFloat(local) !== value) setLocal(String(value));

  return h("div",null,
    h("label",{style:{display:"block",fontSize:10,fontWeight:700,color:MUTED,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:4}},label),
    h("input",{
      type:"text", inputMode:"decimal", value:local,
      onChange:e=>setLocal(e.target.value),
      onFocus:e=>{setFocused(true);e.target.style.borderColor="#22d07a";},
      onBlur:e=>{
        setFocused(false);
        e.target.style.borderColor="#2a2a4a";
        let num = parseFloat(local.replace(",","."));
        if (isNaN(num)||local.trim()==="") num=0;
        if (max!==null) num=Math.min(max,num);
        if (min!==null) num=Math.max(min,num);
        setLocal(String(num));
        onCommit(num);
      },
      style:{width:"100%",background:"#0a0a14",border:"1px solid #2a2a4a",borderRadius:8,padding:"9px 12px",color:"#fff",fontSize:14,fontFamily:"'JetBrains Mono',monospace",boxSizing:"border-box"}
    })
  );
}

}

  async function llamarGemini(texto) {
    const res = await fetch(GEMINI_PROXY, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ texto })
    });
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || "Error del servidor");
    return data;
  }

  async function leerPDF(archivo) {
    setProLoading(true); setProError(null); setProResultado(null);
    try {
      const b64 = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result.split(",")[1]); r.onerror=rej; r.readAsDataURL(archivo); });
      const lib = await new Promise((resolve,reject)=>{ if(window.pdfjsLib){resolve(window.pdfjsLib);return;} const s=document.createElement("script"); s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"; s.onload=()=>{ window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js"; resolve(window.pdfjsLib); }; s.onerror=()=>reject(new Error("No se pudo cargar pdf.js")); document.head.appendChild(s); });
      const pdfArr = new Uint8Array(atob(b64).split("").map(c=>c.charCodeAt(0)));
      const pdf = await lib.getDocument({data:pdfArr}).promise;
      let texto=""; for(let i=1;i<=Math.min(pdf.numPages,10);i++){ const pg=await pdf.getPage(i); const ct=await pg.getTextContent(); texto+=ct.items.map(x=>x.str).join(" ")+"\n"; }
      if (!texto.trim()) throw new Error("No se pudo extraer texto del PDF");
      const resultado = await llamarGemini(texto);
      setProResultado({ok:true,...resultado});
    } catch(e) { setProError(e.message); }
    finally { setProLoading(false); }
  }

  async function leerURL() {
    if (!proUrl.trim()) return;
    setProLoading(true); setProError(null); setProResultado(null);
    try {

      const res = await fetch(GEMINI_PROXY, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: proUrl.trim() })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || "Error al procesar la URL");
      setProResultado({ ok:true, ...data });
    } catch(e) { setProError(e.message); }
    finally { setProLoading(false); }
  }

              ["Costo total",recalcEntry.resOriginal.costoTotal,recalcEntry.resActual.costoTotal],
              ["Precio sugerido",recalcEntry.resOriginal.precioSugerido,recalcEntry.resActual.precioSugerido],
              ["Ganancia",recalcEntry.resOriginal.ganancia,recalcEntry.resActual.ganancia],
            ].flatMap(([label,orig,actual])=>{
              const diff=actual-orig;
              const diffPct=orig>0?Math.round(diff/orig*100):0;
              const color=diff>0?"#f87171":diff<0?"#22d07a":MUTED;
              return [
                h("div",{key:label+"l",style:{padding:"12px",fontSize:13,borderBottom:"1px solid #0a0a14"}},label),
                h("div",{key:label+"o",style:{padding:"12px",fontSize:13,fontFamily:"monospace",color:"#888",borderBottom:"1px solid #0a0a14"}},fmt(Math.round(orig))),
                h("div",{key:label+"a",style:{padding:"12px",fontSize:13,fontFamily:"monospace",fontWeight:700,color,borderBottom:"1px solid #0a0a14"}},fmt(Math.round(actual)),diff!==0&&h("span",{style:{fontSize:10,marginLeft:6}},(diff>0?"+":"")+diffPct+"%")),
              ];
            })
          )
        ),
        (()=>{
          const diff=recalcEntry.resActual.precioSugerido-recalcEntry.resOriginal.precioSugerido;
          const diffPct=Math.round(diff/recalcEntry.resOriginal.precioSugerido*100);
          const subio=diff>0;
          return h("div",{style:{background:subio?"#f8717112":"#22d07a12",border:"1px solid "+(subio?"#f8717130":"#22d07a30"),borderRadius:12,padding:16,textAlign:"center",marginBottom:16}},
            h("div",{style:{fontSize:13,color:MUTED,marginBottom:6}},"Diferencia en precio de venta"),
            h("div",{style:{fontSize:32,fontWeight:900,fontFamily:"monospace",color:subio?"#f87171":"#22d07a"}},(diff>0?"+":"")+fmt(Math.round(diff))),
            h("div",{style:{fontSize:13,color:subio?"#f87171":"#22d07a",marginTop:4}},(diffPct>0?"+":"")+diffPct+"% vs precio original"),
            h("div",{style:{fontSize:12,color:MUTED,marginTop:8}},subio?"📈 Los costos subieron — deberías actualizar tu precio":"📉 Los costos bajaron — podés ser más competitivo")
          );
        })(),
        h("div",{style:{display:"flex",gap:8}},
          h("button",{onClick:()=>setRecalcEntry(null),style:{...BTN,flex:1,background:"transparent",border:"1px solid #2a2a4a",color:MUTED,padding:12,borderRadius:10,fontSize:13}},"Cerrar"),
          h("button",{
            onClick:()=>{
              const nueva={...recalcEntry.entry,id:Date.now(),costoTotal:recalcEntry.resActual.costoTotal,precioSugerido:recalcEntry.resActual.precioSugerido,ganancia:recalcEntry.resActual.ganancia,fecha:new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"short",year:"numeric"}),hora:new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})};
              setHistorial(p=>[nueva,...p].slice(0,50));
              saveEntryToDB(nueva);
              setRecalcEntry(null);
            },
            style:{...BTN,flex:2,background:"#38bdf8",color:"#0a0a14",padding:12,borderRadius:10,fontSize:13,fontWeight:700}
          },"💾 Guardar precio actualizado")
        )
      )
    ),

    // Modal nuevo/editar pedido
    showNuevoPedido && h(Modal,{title:editPedido?"✏️ Editar pedido":"📦 Nuevo pedido",onClose:()=>{setShowNuevoPedido(false);setEditPedido(null);}},
      h(Field,{label:"Cliente",value:nuevoPedido.cliente,onChange:v=>setNuevoPedido(p=>({...p,cliente:v})),placeholder:"Nombre del cliente"}),
      h(Field,{label:"Descripción del trabajo",value:nuevoPedido.descripcion,onChange:v=>setNuevoPedido(p=>({...p,descripcion:v})),placeholder:"Ej: 10 tazas sublimadas con foto"}),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
        h("div",null,
          h("label",{style:{display:"block",fontSize:10,fontWeight:700,color:MUTED,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}},"Tipo de trabajo"),
          h("select",{value:nuevoPedido.tipo,onChange:e=>setNuevoPedido(p=>({...p,tipo:e.target.value})),style:{width:"100%",background:"#0a0a14",border:"1px solid #2a2a4a",borderRadius:8,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"inherit",boxSizing:"border-box",cursor:"pointer"}},
            ["🖨️ 3D","🎨 Sublimación","🧵 Bordado","✂️ Vinilo","⚡ Láser","🔧 Otro"].map(t=>h("option",{key:t,value:t},t))
          )
        ),
        h("div",null,
          h("label",{style:{display:"block",fontSize:10,fontWeight:700,color:MUTED,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}},"Estado"),
          h("select",{value:nuevoPedido.estado,onChange:e=>setNuevoPedido(p=>({...p,estado:e.target.value})),style:{width:"100%",background:"#0a0a14",border:"1px solid #2a2a4a",borderRadius:8,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"inherit",boxSizing:"border-box",cursor:"pointer"}},
            h("option",{value:"pendiente"},"🕐 Pendiente"),
            h("option",{value:"proceso"},"⚙️ En proceso"),
            h("option",{value:"terminado"},"✅ Terminado")
          )
        )
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:4}},
        h(Field,{label:"Fecha de entrega",value:nuevoPedido.fechaEntrega,onChange:v=>setNuevoPedido(p=>({...p,fechaEntrega:v})),type:"date"}),
        h(Field,{label:"Precio acordado ($)",value:nuevoPedido.precio,onChange:v=>setNuevoPedido(p=>({...p,precio:parseFloat(v)||0})),type:"number",step:"100",min:"0",placeholder:"0"})
      ),
      h(Field,{label:"Notas adicionales",value:nuevoPedido.notas,onChange:v=>setNuevoPedido(p=>({...p,notas:v})),placeholder:"Colores, medidas, detalles especiales..."}),
      h("button",{
        onClick:()=>{
          if (!nuevoPedido.cliente.trim()&&!nuevoPedido.descripcion.trim()) return;
          if (editPedido) {
            setPedidos(p=>p.map(x=>x.id===editPedido.id?{...x,...nuevoPedido}:x));
          } else {
            setPedidos(p=>[{id:Date.now(),...nuevoPedido,creadoEn:new Date().toISOString()},...p]);
          }
          setShowNuevoPedido(false); setEditPedido(null);
        },
        style:{...BTN,background:"#ff5c1a",color:"#fff",width:"100%",padding:14,marginTop:8,borderRadius:10,fontSize:14}
      },editPedido?"💾 Guardar cambios":"📦 Crear pedido")
    ),

    showCodigo && h(Modal,{title:"⭐ Activar Plan Pro",onClose:()=>{setShowCodigo(false);setCodigoError("");setCodigoInput("");}},
      h("div",{style:{background:"#fbbf2412",border:"1px solid #fbbf2430",borderRadius:10,padding:"12px 14px",marginBottom:16,fontSize:13,color:"#d4a82a",lineHeight:1.6}},"Ingresá el código que recibiste al suscribirte al plan Pro."),
      h(Field,{label:"Código de acceso",value:codigoInput,onChange:v=>{setCodigoInput(v.toUpperCase());setCodigoError("");},placeholder:"Ej: JP-2026-001"}),
      codigoError && h("div",{style:{color:"#f87171",fontSize:13,marginBottom:12,background:"#f8717115",border:"1px solid #f8717130",borderRadius:8,padding:"8px 12px"}},"❌ "+codigoError),
      h("button",{onClick:activarPro,style:{...BTN,background:"#fbbf24",color:"#0a0a14",width:"100%",padding:14,borderRadius:10,fontSize:14,marginBottom:10}},"🔑 Activar Pro"),
      h("a",{href:"/precios.html",style:{display:"block",textAlign:"center",fontSize:13,color:MUTED,textDecoration:"none",padding:10}},"¿No tenés código? Suscribite acá →")
    ),

    showInsumo && h(Modal,{title:editIns?"Editar insumo":"Nuevo insumo",onClose:()=>{setShowInsumo(false);setEditIns(null);}},
      h(Field,{label:"Nombre",value:newIns.nombre,onChange:v=>setNewIns(p=>({...p,nombre:v})),placeholder:"Ej: Filamento PLA Negro"}),
      h(DropSelect,{label:"Tipo",value:newIns.tipo,onChange:v=>setNewIns(p=>({...p,tipo:v})),options:[{value:"3D",label:"🖨️ 3D"},{value:"SUB",label:"🎨 Sub"},{value:"BOR",label:"🧵 Bordado"},{value:"VIN",label:"✂️ Vinilo"},{value:"LAS",label:"⚡ Láser"},{value:"General",label:"⚙️ General"}]}),
      h(Field,{label:"Unidad",value:newIns.unidad,onChange:v=>setNewIns(p=>({...p,unidad:v})),placeholder:"gr, u, hoja..."}),
      h(Field,{label:"Costo ($)",value:newIns.costo,onChange:v=>setNewIns(p=>({...p,costo:v})),type:"number",step:1,min:0}),
      h("button",{onClick:saveInsumo,style:{...BTN,background:"#ff5c1a",color:"#fff",width:"100%",padding:14,marginTop:4,borderRadius:10,fontSize:14}},editIns?"Guardar cambios":"Agregar insumo")
    ),

    showPerf && h(Modal,{title:editPerf?"Editar perfil":"Nuevo perfil",onClose:()=>{setShowPerf(false);setEditPerf(null);}},
      h(Field,{label:"Nombre",value:newPerf.nombre,onChange:v=>setNewPerf(p=>({...p,nombre:v})),placeholder:"Ej: Taller principal"}),
      h(Field,{label:"Electricidad ($/hr)",value:newPerf.electricidad,onChange:v=>setNewPerf(p=>({...p,electricidad:v})),type:"number",step:10,min:0}),
      h(Field,{label:"Fijos 3D ($/trabajo)",value:newPerf.fijos3D,onChange:v=>setNewPerf(p=>({...p,fijos3D:v})),type:"number",step:100,min:0}),
      h(Field,{label:"Fijos Sub ($/trabajo)",value:newPerf.fijosSub,onChange:v=>setNewPerf(p=>({...p,fijosSub:v})),type:"number",step:100,min:0}),
      h("button",{onClick:savePerfil,style:{...BTN,background:"#22d07a",color:"#0a0a14",width:"100%",padding:14,marginTop:4,borderRadius:10,fontSize:14}},editPerf?"Guardar cambios":"Crear perfil")
    ),

    showCliente && h(Modal,{title:"📄 Datos del cliente",onClose:()=>setShowCliente(false)},
      h("div",{style:{fontSize:12,color:MUTED,marginBottom:16,lineHeight:1.6}},"Estos datos aparecerán en el PDF. Podés dejar los campos vacíos."),
      h(Field,{label:"Nombre del cliente",value:cliente.nombre,onChange:v=>setCliente(p=>({...p,nombre:v})),placeholder:"Ej: María García"}),
      h(Field,{label:"Descripción del trabajo",value:cliente.descripcion,onChange:v=>setCliente(p=>({...p,descripcion:v})),placeholder:"Ej: Taza cerámica con foto"}),
      h(Field,{label:"Nro de pedido (opcional)",value:cliente.nroPedido,onChange:v=>setCliente(p=>({...p,nroPedido:v})),placeholder:"Ej: #001"}),
      h("button",{onClick:()=>{setShowCliente(false);exportarPDF(tab.label,vals,res,cliente);},style:{...BTN,background:"#ff5c1a",color:"#fff",width:"100%",padding:14,marginTop:4,borderRadius:10,fontSize:14}},"📄 Generar PDF →")
    ),

    showPlantilla && h(Modal,{title:"📋 Guardar plantilla",onClose:()=>setShowPlantilla(false)},
      h("div",{style:{fontSize:12,color:MUTED,marginBottom:16,lineHeight:1.6}},"Guardás la configuración actual de "+tab.label+" como plantilla reutilizable."),
      h(Field,{label:"Nombre de la plantilla",value:plantillaNombre,onChange:setPlantillaNombre,placeholder:"Ej: Taza cerámica estándar"}),
      h("button",{onClick:async()=>{if(!plantillaNombre.trim())return;const nueva={id:Date.now(),nombre:plantillaNombre,tipo:tab.id,vals:{...vals}};setPlantillas(p=>[nueva,...p]);await savePlantillaDB(nueva);setShowPlantilla(false);setPlantillaNombre("");},style:{...BTN,background:"#ff5c1a",color:"#fff",width:"100%",padding:14,marginTop:4,borderRadius:10,fontSize:14}},"💾 Guardar plantilla")
    )
  );
}

createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
