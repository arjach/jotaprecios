  * { margin: 0; padding: 0; box-sizing: border-box; }

  .big-number span { color: var(--orange); }
  .content { position: relative; z-index: 1; margin-top: -40px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--orange); letter-spacing: 0.06em; margin-bottom: 20px; }

  .btn-primary { display: inline-block; background: var(--orange); color: #fff; border: none; padding: 16px 36px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; margin-bottom: 16px; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(255,92,26,0.3); }
  .links { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
  .link { font-size: 14px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .link:hover { color: var(--orange); }
  .emoji-float { position: fixed; font-size: 24px; opacity: 0.05; animation: float linear infinite; pointer-events: none; }
  @keyframes float { from { transform: translateY(0) rotate(0deg); } to { transform: translateY(-110vh) rotate(360deg); } }
  @media (max-width: 480px) { .big-number { font-size: 140px; } .content { margin-top: -20px; } }
